<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uncensored AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1a1a2e;border:1px solid #333;border-bottom-left-radius:4px}
.msg.system{align-self:center;background:#1a1a1a;color:#888;font-size:0.85em;border:1px solid #222}
#input-area{display:flex;gap:8px;padding:16px;background:#111;border-top:1px solid #222}
#user-input{flex:1;padding:12px 16px;background:#1a1a2e;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;resize:none;outline:none}
#user-input:focus{border-color:#2563eb}
#send-btn{padding:12px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
#send-btn:hover{background:#1d4ed8}
#send-btn:disabled{background:#333;cursor:not-allowed}
.header{padding:16px 20px;background:#111;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.2em;color:#fff}
.header select{padding:8px;background:#1a1a2e;border:1px solid #333;color:#fff;border-radius:6px}
.header button{padding:8px 12px;background:#dc2626;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85em}
.typing{color:#888;font-style:italic;align-self:flex-start;padding:8px 16px}
#model-badge{font-size:0.75em;color:#888;background:#1a1a2e;padding:4px 8px;border-radius:4px}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Uncensored AI</h1>
    <span id="model-badge">loading...</span>
  </div>
  <button onclick="clearChat()">Clear Chat</button>
</div>
<div id="chat-container"></div>
<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>
<script>
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let sessionId = 'session-' + Math.random().toString(36).substr(2, 9);

async function loadModel() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    document.getElementById('model-badge').textContent = data.current_model;
  } catch(e) {
    document.getElementById('model-badge').textContent = 'error loading model';
  }
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

async function sendMessage() {
  const msg = userInput.value.trim();
  if (!msg) return;

  userInput.value = '';
  sendBtn.disabled = true;
  addMessage('user', msg);

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Thinking...';
  chatContainer.appendChild(typing);
  chatContainer.scrollTop = chatContainer.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, session_id: sessionId})
    });

    typing.remove();

    if (!res.ok) {
      const err = await res.json();
      addMessage('system', 'Error: ' + (err.detail || 'Unknown error'));
    } else {
      const data = await res.json();
      addMessage('assistant', data.reply);
    }
  } catch(e) {
    typing.remove();
    addMessage('system', 'Connection error. Is the server running?');
  }

  sendBtn.disabled = false;
  userInput.focus();
}

async function clearChat() {
  await fetch('/api/history/' + sessionId, {method: 'DELETE'});
  chatContainer.innerHTML = '';
  sessionId = 'session-' + Math.random().toString(36).substr(2, 9);
  addMessage('system', 'Chat cleared. New session started.');
}

loadModel();
addMessage('system', 'Welcome! Ask me anything. Type your message below.');
</script>
</body>
</html>
