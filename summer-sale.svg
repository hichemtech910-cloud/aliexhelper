<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c040;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="600" fill="url(#bg)"/>
  
  <!-- Decorative patterns -->
  <circle cx="100" cy="80" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1850" cy="500" r="150" fill="rgba(255,255,255,0.04)"/>
  <circle cx="960" cy="30" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="300" cy="550" r="100" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1700" cy="100" r="90" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Shopping bag icon left -->
  <g transform="translate(120, 200)" opacity="0.12">
    <rect x="10" y="50" width="100" height="90" rx="8" fill="#fff"/>
    <path d="M30,50 Q30,20 60,20 Q90,20 90,50" fill="none" stroke="#fff" stroke-width="6"/>
  </g>
  
  <!-- Shopping bag icon right -->
  <g transform="translate(1700, 250)" opacity="0.1">
    <rect x="10" y="50" width="80" height="70" rx="6" fill="#fff"/>
    <path d="M25,50 Q25,25 50,25 Q75,25 75,50" fill="none" stroke="#fff" stroke-width="5"/>
  </g>
  
  <!-- Gift boxes -->
  <g transform="translate(200, 100)" opacity="0.1">
    <rect x="0" y="20" width="50" height="40" rx="4" fill="#ffd700"/>
    <rect x="22" y="10" width="6" height="60" fill="#fff"/>
    <rect x="0" y="35" width="50" height="6" fill="#fff"/>
  </g>
  <g transform="translate(1650, 80)" opacity="0.08">
    <rect x="0" y="20" width="40" height="35" rx="4" fill="#ffd700"/>
    <rect x="18" y="10" width="5" height="55" fill="#fff"/>
    <rect x="0" y="30" width="40" height="5" fill="#fff"/>
  </g>
  
  <!-- Stars scattered -->
  <text x="250" y="60" font-size="24" fill="#ffd700" opacity="0.5">★</text>
  <text x="500" y="90" font-size="18" fill="#ffd700" opacity="0.3">★</text>
  <text x="1400" y="70" font-size="22" fill="#ffd700" opacity="0.4">★</text>
  <text x="1600" y="400" font-size="16" fill="#ffd700" opacity="0.3">★</text>
  <text x="350" y="500" font-size="20" fill="#ffd700" opacity="0.25">★</text>
  <text x="1200" y="550" font-size="14" fill="#ffd700" opacity="0.2">★</text>
  
  <!-- Percentage badges floating -->
  <g transform="translate(180, 350)" opacity="0.15">
    <circle cx="30" cy="30" r="28" fill="#ffd700"/>
    <text x="30" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#e74c3c">70%</text>
  </g>
  <g transform="translate(1680, 380)" opacity="0.12">
    <circle cx="25" cy="25" r="23" fill="#ffd700"/>
    <text x="25" y="32" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e74c3c">50%</text>
  </g>
  
  <!-- Sun -->
  <circle cx="1820" cy="80" r="45" fill="#ffd700" opacity="0.85"/>
  <g stroke="#ffd700" stroke-width="2.5" opacity="0.5">
    <line x1="1820" y1="20" x2="1820" y2="5"/>
    <line x1="1820" y1="140" x2="1820" y2="155"/>
    <line x1="1760" y1="80" x2="1745" y2="80"/>
    <line x1="1880" y1="80" x2="1895" y2="80"/>
    <line x1="1778" y1="38" x2="1767" y2="27"/>
    <line x1="1862" y1="122" x2="1873" y2="133"/>
    <line x1="1862" y1="38" x2="1873" y2="27"/>
    <line x1="1778" y1="122" x2="1767" y2="133"/>
  </g>
  
  <!-- Waves -->
  <path d="M0,540 Q320,510 640,540 T1280,540 T1920,540 L1920,600 L0,600 Z" fill="rgba(255,255,255,0.08)"/>
  <path d="M0,565 Q320,535 640,565 T1280,565 T1920,565 L1920,600 L0,600 Z" fill="rgba(255,255,255,0.06)"/>

  <!-- Main title -->
  <text x="960" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="900" fill="url(#gold)" filter="url(#shadow)">عروض الصيف</text>
  
  <!-- Subtitle -->
  <text x="960" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="600" fill="#fff" opacity="0.95">تسوّق من علي إكسبرس بأقل الأسعار</text>
  
  <!-- AliExpress branding line -->
  <text x="960" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)">ALIEXPRESS.COM</text>

  <!-- CTA Button -->
  <rect x="810" y="360" width="300" height="55" rx="27" fill="url(#btnGrad)" filter="url(#shadow)"/>
  <text x="960" y="396" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#e74c3c">تسوّق الآن</text>
  
  <!-- Coupon pills at bottom -->
  <g transform="translate(960, 470)">
    <rect x="-420" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="-365" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffd700">$2 خصم</text>
    
    <rect x="-290" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="-235" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffd700">$9 خصم</text>
    
    <rect x="-160" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="-105" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffd700">$25 خصم</text>
    
    <rect x="-30" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="25" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffd700">$40 خصم</text>
    
    <rect x="100" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="155" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffd700">$55 خصم</text>
    
    <rect x="230" y="0" width="110" height="40" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="285" y="26" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffd700">خصومات 70%</text>
  </g>
</svg>
