name: AliExpress Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests python-dotenv

      - run: python scraper/scraper.py --once
        env:
          WEBSITE_URL: "https://aliexhelper.store"
          API_SECRET: "dzexpress-secret-2024"
          ALI_APP_KEY: "502678"
          ALI_APP_SECRET: "Ds7f3NQm0EpuK5VUsTVKlS3sRnOkkXoH"
          TRACKING_ID: "hixem"
          SCRAPE_INTERVAL: "3600"
          MAX_PRODUCTS_PER_RUN: "10"
